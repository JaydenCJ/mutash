<svg xmlns="http://www.w3.org/2000/svg" width="1060" height="600" viewBox="0 0 1060 600" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="15">
  <!-- Terminal rendering of a real mutash session (output copied verbatim
       from a run against examples/deploy.sh on 2026-07-13). -->
  <rect width="1060" height="600" rx="10" fill="#1c2128"/>
  <rect width="1060" height="34" rx="10" fill="#2d333b"/>
  <rect y="24" width="1060" height="10" fill="#2d333b"/>
  <circle cx="20" cy="17" r="6" fill="#f47067"/>
  <circle cx="40" cy="17" r="6" fill="#e0b543"/>
  <circle cx="60" cy="17" r="6" fill="#57ab5a"/>
  <text x="530" y="22" text-anchor="middle" fill="#909dab">mutash — how good are your shell tests, really?</text>

  <g fill="#adbac7">
    <text x="24" y="64"><tspan fill="#6cb6ff">$</tspan> mutash run deploy.sh --tests "bash tests/run.sh"</text>
    <text x="24" y="90" fill="#768390">mutash 0.1.0 — mutation run</text>
    <text x="24" y="114" fill="#768390">  tests:    bash tests/run.sh</text>
    <text x="24" y="138" fill="#768390">  target:   deploy.sh (35 mutants)</text>
    <text x="24" y="162" fill="#768390">  baseline: pass in 0.10s (per-mutant timeout: 2.3s)</text>

    <text x="24" y="194">  #6    deploy.sh:27:10   compare  `-ge` -&gt; `-gt`   =&gt; <tspan fill="#57ab5a">killed</tspan> (0.02s)</text>
    <text x="24" y="218">  #10   deploy.sh:27:30   compare  `-lt` -&gt; `-le`   =&gt; <tspan fill="#57ab5a">killed</tspan> (0.05s)</text>
    <text x="24" y="242">  #13   deploy.sh:33:22   compare  `-le` -&gt; `-lt`   =&gt; <tspan fill="#f47067">survived</tspan> (0.10s)</text>
    <text x="24" y="266">  #15   deploy.sh:37:24   arith    `+` -&gt; `-`       =&gt; <tspan fill="#e0b543">timeout</tspan> (2.32s)</text>
    <text x="24" y="290">  #25   deploy.sh:53:9    flag     drop `-p`        =&gt; <tspan fill="#f47067">survived</tspan> (0.19s)</text>
    <text x="24" y="314">  #34   deploy.sh:68:12   exit     `1` -&gt; `0`       =&gt; <tspan fill="#f47067">survived</tspan> (0.24s)</text>
    <text x="24" y="338" fill="#768390">  … 29 more mutants …</text>

    <text x="24" y="378" fill="#e0b543">Survivors (4):</text>
    <text x="24" y="406">  #13  deploy.sh:33:22  compare  `-le` -&gt; `-lt`</text>
    <text x="24" y="430" fill="#909dab">      &gt; while [ "$attempt" -le "$MAX_ATTEMPTS" ]; do</text>
    <text x="24" y="454">  #34  deploy.sh:68:12  exit  `1` -&gt; `0`</text>
    <text x="24" y="478" fill="#909dab">      &gt; return 1</text>
    <text x="24" y="502" fill="#768390">  … nobody tests the retry limit, or a deploy that fails after validation.</text>

    <text x="24" y="546"><tspan fill="#96d0ff">Score: 88.6%</tspan>  (31/35 detected: 29 killed, 4 survived, 2 timeout, 0 error)   <tspan fill="#e0b543">Grade: B</tspan></text>
    <text x="24" y="578" fill="#768390"># kill the survivors, watch the grade climb.</text>
  </g>
</svg>
